<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Isometric view of three-tier microsegmentation: Web, App, and DB tiers floating as planes connected by allowed cyan traffic arcs and severed red lateral arcs, sitting above an Open vSwitch substrate.">
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="85%">
      <stop offset="0%" stop-color="#15294a"/>
      <stop offset="65%" stop-color="#0c1c36"/>
      <stop offset="100%" stop-color="#070f20"/>
    </radialGradient>

    <!-- Tier plane gradients (purple-blue tone for Web, blue for App, gold for DB to set them apart) -->
    <linearGradient id="webTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a87ad8"/>
      <stop offset="100%" stop-color="#6a47a3"/>
    </linearGradient>
    <linearGradient id="webLeft" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#6a47a3"/>
      <stop offset="100%" stop-color="#3d2666"/>
    </linearGradient>
    <linearGradient id="webRight" x1="0" y1="0.4" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d2666"/>
      <stop offset="100%" stop-color="#221340"/>
    </linearGradient>

    <linearGradient id="appTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d6aa6"/>
      <stop offset="100%" stop-color="#27497a"/>
    </linearGradient>
    <linearGradient id="appLeft" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#1f3a66"/>
      <stop offset="100%" stop-color="#142a4d"/>
    </linearGradient>
    <linearGradient id="appRight" x1="0" y1="0.4" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f2444"/>
      <stop offset="100%" stop-color="#091a33"/>
    </linearGradient>

    <linearGradient id="dbTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#a87515"/>
    </linearGradient>
    <linearGradient id="dbLeft" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#a87515"/>
      <stop offset="100%" stop-color="#6b4a08"/>
    </linearGradient>
    <linearGradient id="dbRight" x1="0" y1="0.4" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b4a08"/>
      <stop offset="100%" stop-color="#3d2a04"/>
    </linearGradient>

    <!-- VM cubes neutral -->
    <linearGradient id="vmTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8b8d4"/>
      <stop offset="100%" stop-color="#7c8aa8"/>
    </linearGradient>
    <linearGradient id="vmLeft" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#7c8aa8"/>
      <stop offset="100%" stop-color="#5a6680"/>
    </linearGradient>
    <linearGradient id="vmRight" x1="0" y1="0.4" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a6680"/>
      <stop offset="100%" stop-color="#3a4456"/>
    </linearGradient>

    <!-- OVS substrate band -->
    <linearGradient id="ovsband" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00d4ff" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#4a9eff" stop-opacity="0.7"/>
      <stop offset="80%" stop-color="#00d4ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Faint grid for depth -->
  <g stroke="#1a3258" stroke-width="1" opacity="0.4" fill="none">
    <path d="M 0 720 L 1600 720"/>
    <path d="M 0 760 L 1600 760"/>
    <path d="M 0 800 L 1600 800"/>
  </g>

  <!-- ============ Three tier planes (isometric flat slabs) ============ -->
  <!-- Web tier (top-left) -->
  <g transform="translate(280,200)">
    <polygon points="0,80 280,80 360,40 80,40" fill="url(#webTop)"/>
    <polygon points="0,80 280,80 280,108 0,108" fill="url(#webLeft)"/>
    <polygon points="280,80 360,40 360,68 280,108" fill="url(#webRight)"/>
    <text x="40" y="64" font-family="JetBrains Mono, monospace" font-size="14" fill="#f4e2ff" font-weight="700" letter-spacing="1.5">TIER: Web</text>

    <!-- 4 VM cubes on the plane -->
    <g transform="translate(20,20)">
      <polygon points="0,28 30,28 38,20 8,20" fill="url(#vmTop)"/>
      <polygon points="0,28 30,28 30,42 0,42" fill="url(#vmLeft)"/>
      <polygon points="30,28 38,20 38,34 30,42" fill="url(#vmRight)"/>
    </g>
    <g transform="translate(70,20)">
      <polygon points="0,28 30,28 38,20 8,20" fill="url(#vmTop)"/>
      <polygon points="0,28 30,28 30,42 0,42" fill="url(#vmLeft)"/>
      <polygon points="30,28 38,20 38,34 30,42" fill="url(#vmRight)"/>
    </g>
    <g transform="translate(120,20)">
      <polygon points="0,28 30,28 38,20 8,20" fill="url(#vmTop)"/>
      <polygon points="0,28 30,28 30,42 0,42" fill="url(#vmLeft)"/>
      <polygon points="30,28 38,20 38,34 30,42" fill="url(#vmRight)"/>
    </g>
    <g transform="translate(170,20)">
      <polygon points="0,28 30,28 38,20 8,20" fill="url(#vmTop)"/>
      <polygon points="0,28 30,28 30,42 0,42" fill="url(#vmLeft)"/>
      <polygon points="30,28 38,20 38,34 30,42" fill="url(#vmRight)"/>
    </g>
  </g>

  <!-- App tier (middle-center, slightly lower) -->
  <g transform="translate(660,340)">
    <polygon points="0,80 280,80 360,40 80,40" fill="url(#appTop)"/>
    <polygon points="0,80 280,80 280,108 0,108" fill="url(#appLeft)"/>
    <polygon points="280,80 360,40 360,68 280,108" fill="url(#appRight)"/>
    <text x="40" y="64" font-family="JetBrains Mono, monospace" font-size="14" fill="#dbe7ff" font-weight="700" letter-spacing="1.5">TIER: App</text>

    <g transform="translate(20,20)">
      <polygon points="0,28 30,28 38,20 8,20" fill="url(#vmTop)"/>
      <polygon points="0,28 30,28 30,42 0,42" fill="url(#vmLeft)"/>
      <polygon points="30,28 38,20 38,34 30,42" fill="url(#vmRight)"/>
    </g>
    <g transform="translate(70,20)">
      <polygon points="0,28 30,28 38,20 8,20" fill="url(#vmTop)"/>
      <polygon points="0,28 30,28 30,42 0,42" fill="url(#vmLeft)"/>
      <polygon points="30,28 38,20 38,34 30,42" fill="url(#vmRight)"/>
    </g>
    <g transform="translate(120,20)">
      <polygon points="0,28 30,28 38,20 8,20" fill="url(#vmTop)"/>
      <polygon points="0,28 30,28 30,42 0,42" fill="url(#vmLeft)"/>
      <polygon points="30,28 38,20 38,34 30,42" fill="url(#vmRight)"/>
    </g>
  </g>

  <!-- DB tier (bottom-right) -->
  <g transform="translate(1040,480)">
    <polygon points="0,80 280,80 360,40 80,40" fill="url(#dbTop)"/>
    <polygon points="0,80 280,80 280,108 0,108" fill="url(#dbLeft)"/>
    <polygon points="280,80 360,40 360,68 280,108" fill="url(#dbRight)"/>
    <text x="40" y="64" font-family="JetBrains Mono, monospace" font-size="14" fill="#fff5d4" font-weight="700" letter-spacing="1.5">TIER: DB</text>

    <g transform="translate(40,20)">
      <polygon points="0,28 30,28 38,20 8,20" fill="url(#vmTop)"/>
      <polygon points="0,28 30,28 30,42 0,42" fill="url(#vmLeft)"/>
      <polygon points="30,28 38,20 38,34 30,42" fill="url(#vmRight)"/>
    </g>
    <g transform="translate(110,20)">
      <polygon points="0,28 30,28 38,20 8,20" fill="url(#vmTop)"/>
      <polygon points="0,28 30,28 30,42 0,42" fill="url(#vmLeft)"/>
      <polygon points="30,28 38,20 38,34 30,42" fill="url(#vmRight)"/>
    </g>
  </g>

  <!-- ============ Allowed traffic arcs (cyan, dashed, with arrowheads) ============ -->
  <defs>
    <marker id="arrowAllow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d4ff"/>
    </marker>
    <marker id="arrowBlock" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Web -> App allowed (8080) -->
  <g fill="none" stroke="#00d4ff" stroke-width="2.4" opacity="0.9">
    <path d="M 540 280 Q 700 320 760 380" stroke-dasharray="8 4" marker-end="url(#arrowAllow)"/>
  </g>
  <text x="600" y="312" font-family="JetBrains Mono, monospace" font-size="12" fill="#00d4ff" font-weight="700">8080/tcp ✓</text>

  <!-- App -> DB allowed (5432) -->
  <g fill="none" stroke="#00d4ff" stroke-width="2.4" opacity="0.9">
    <path d="M 920 420 Q 1080 460 1140 520" stroke-dasharray="8 4" marker-end="url(#arrowAllow)"/>
  </g>
  <text x="980" y="450" font-family="JetBrains Mono, monospace" font-size="12" fill="#00d4ff" font-weight="700">5432/tcp ✓</text>

  <!-- Web -> DB BLOCKED (red, broken line, X marker) -->
  <g fill="none" stroke="#f87171" stroke-width="2.2" opacity="0.85" stroke-dasharray="3 7">
    <path d="M 540 280 Q 800 360 1080 520"/>
  </g>
  <!-- X marker on the blocked line -->
  <g transform="translate(810,400)" stroke="#f87171" stroke-width="3" fill="none">
    <circle cx="0" cy="0" r="14" fill="#0a1628" stroke="#f87171" stroke-width="2"/>
    <line x1="-7" y1="-7" x2="7" y2="7"/>
    <line x1="-7" y1="7" x2="7" y2="-7"/>
  </g>
  <text x="830" y="384" font-family="JetBrains Mono, monospace" font-size="11" fill="#f87171" font-weight="700">DENY · lateral move</text>

  <!-- Internet -> Web (443 inbound) -->
  <g fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.7">
    <path d="M 380 130 L 380 200" stroke-dasharray="6 4" marker-end="url(#arrowAllow)"/>
  </g>
  <text x="394" y="158" font-family="JetBrains Mono, monospace" font-size="11" fill="#00d4ff">443/tcp · inbound</text>
  <g transform="translate(360,108)">
    <circle cx="20" cy="0" r="14" fill="none" stroke="#a8b8d4" stroke-width="1.5"/>
    <text x="20" y="4" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#a8b8d4">www</text>
  </g>

  <!-- ============ OVS substrate band at the bottom (the kernel switch underlying everything) ============ -->
  <rect x="100" y="720" width="1400" height="38" fill="url(#ovsband)" opacity="0.6" filter="url(#soft)"/>
  <rect x="100" y="728" width="1400" height="22" fill="url(#ovsband)" opacity="0.85"/>
  <text x="120" y="714" font-family="JetBrains Mono, monospace" font-size="13" fill="#00d4ff" letter-spacing="2">OPEN vSWITCH · br0 · FLOW RULES IN KERNEL</text>

  <!-- Bridge dots along OVS band -->
  <g>
    <circle cx="280" cy="738" r="10" fill="url(#dot)" opacity="0.9"/>
    <circle cx="540" cy="738" r="10" fill="url(#dot)" opacity="0.9"/>
    <circle cx="800" cy="738" r="10" fill="url(#dot)" opacity="0.9"/>
    <circle cx="1060" cy="738" r="10" fill="url(#dot)" opacity="0.9"/>
    <circle cx="1320" cy="738" r="10" fill="url(#dot)" opacity="0.9"/>
  </g>

  <!-- Vertical "enforcement" stems from each tier plane down to the OVS band -->
  <g stroke="#a8b8d4" stroke-width="0.8" opacity="0.35" stroke-dasharray="2 4">
    <path d="M 460 308 L 460 720"/>
    <path d="M 840 448 L 840 720"/>
    <path d="M 1220 588 L 1220 720"/>
  </g>

  <!-- ============ FNS policy badges (gold) at upper-right ============ -->
  <g transform="translate(1200,140)">
    <rect x="0" y="0" width="320" height="120" rx="8" fill="rgba(251,191,36,0.10)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="16" y="24" font-family="JetBrains Mono, monospace" font-size="11" fill="#fbbf24" letter-spacing="1.5" font-weight="700">FLOW NETWORK SECURITY</text>
    <text x="16" y="46" font-family="JetBrains Mono, monospace" font-size="11" fill="#fde68a">Web ⇐ 443 from any</text>
    <text x="16" y="64" font-family="JetBrains Mono, monospace" font-size="11" fill="#fde68a">Web ⇒ 8080 to App</text>
    <text x="16" y="82" font-family="JetBrains Mono, monospace" font-size="11" fill="#fde68a">App ⇒ 5432 to DB</text>
    <text x="16" y="100" font-family="JetBrains Mono, monospace" font-size="11" fill="#a8b8d4">default · deny</text>
  </g>

  <!-- Mono path treatment top-left -->
  <g font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2">
    <text x="76" y="80" fill="#00d4ff" opacity="0.85">/nix/nutanix/06</text>
    <text x="76" y="100" fill="#a8b8d4" opacity="0.75">NETWORKING · OVS · FLOW</text>
  </g>

  <!-- Module title backstop -->
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="76" y="800" fill="#e8f0ff" font-size="16" font-weight="600" letter-spacing="3" opacity="0.85">MODULE 06</text>
    <text x="76" y="850" fill="#e8f0ff" font-size="34" font-weight="700" letter-spacing="-0.5" opacity="0.95">Networking and Microsegmentation</text>
  </g>

  <!-- Side fades for masking edges -->
  <rect x="0" y="0" width="200" height="900" fill="url(#bg)" opacity="0.3"/>
  <rect x="1400" y="0" width="200" height="900" fill="url(#bg)" opacity="0.3"/>
</svg>
