<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="g-title g-desc">
  <title id="g-title">Appendix G hero: CLI reference, terminal session</title>
  <desc id="g-desc">A stylized SSH terminal session in the center showing nutanix@cvm prompt running a sample sequence (ncli cluster info, acli vm.list, ncc health_checks run_all, allssh, ovs-vsctl, manage_ovs, move plan list), with seven tool-name chips arranged around the terminal as a CLI surface map. Mono path top-left. Purple appendix accent.</desc>

  <defs>
    <radialGradient id="bgRad" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#143664"/>
      <stop offset="55%" stop-color="#0c1f3a"/>
      <stop offset="100%" stop-color="#070f1c"/>
    </radialGradient>

    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1c34"/>
      <stop offset="100%" stop-color="#070f1c"/>
    </linearGradient>

    <filter id="purpleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bgRad)"/>

  <g stroke="rgba(74,158,255,0.08)" stroke-width="1" fill="none">
    <path d="M0,720 L1600,720"/>
    <path d="M0,760 L1600,760"/>
    <path d="M0,800 L1600,800"/>
  </g>

  <text x="60" y="64" font-family="JetBrains Mono, ui-monospace, monospace" font-size="15" letter-spacing="0.04em" fill="#a8b8d4">
    <tspan fill="#c084fc">/</tspan>nix<tspan fill="#c084fc">/</tspan>nutanix<tspan fill="#c084fc">/</tspan>appendix-g-cli-reference
  </text>
  <text x="60" y="86" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="0.10em" fill="#6b7a9a" opacity="0.85">REFERENCE · CLI SURFACE · ALWAYS RUN --HELP FIRST</text>

  <text x="800" y="146" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#e8f0ff" letter-spacing="0.16em">THE NUTANIX CLI SURFACE</text>

  <!-- Terminal window in center -->
  <g transform="translate(280, 200)">
    <rect x="0" y="0" width="1040" height="440" rx="8" fill="url(#termBg)" stroke="rgba(192,132,252,0.55)" stroke-width="1.4"/>
    <!-- title bar -->
    <rect x="0" y="0" width="1040" height="32" rx="8" fill="rgba(31,58,102,0.55)"/>
    <circle cx="20" cy="16" r="6" fill="#f87171"/>
    <circle cx="42" cy="16" r="6" fill="#fbbf24"/>
    <circle cx="64" cy="16" r="6" fill="#34d399"/>
    <text x="520" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#a8b8d4">nutanix@cvm-01: ~ — ssh</text>

    <!-- prompt and commands -->
    <g font-family="JetBrains Mono, monospace" font-size="14">
      <text x="24" y="68" fill="#c084fc">nutanix@cvm-01:~$ <tspan fill="#e8f0ff">ssh nutanix@&lt;cvm-ip&gt;</tspan></text>
      <text x="24" y="92" fill="#a8b8d4">  Welcome to Nutanix Controller VM. Cluster: BlueAlly-Lab</text>

      <text x="24" y="124" fill="#c084fc">nutanix@cvm-01:~$ <tspan fill="#e8f0ff">ncli cluster info</tspan></text>
      <text x="24" y="148" fill="#a8b8d4">  Cluster Name      : BlueAlly-Lab-01</text>
      <text x="24" y="166" fill="#a8b8d4">  Cluster ID        : 0005a1b2-c3d4-...</text>
      <text x="24" y="184" fill="#a8b8d4">  Cluster Version   : 7.0.1</text>

      <text x="24" y="216" fill="#c084fc">nutanix@cvm-01:~$ <tspan fill="#e8f0ff">acli vm.list</tspan></text>
      <text x="24" y="240" fill="#a8b8d4">  VM name              VM UUID            Power state    Host IP</text>
      <text x="24" y="258" fill="#a8b8d4">  web-01               8a7b...            ON             10.10.20.11</text>
      <text x="24" y="276" fill="#a8b8d4">  db-01                3f1e...            ON             10.10.20.12</text>

      <text x="24" y="308" fill="#c084fc">nutanix@cvm-01:~$ <tspan fill="#e8f0ff">ncc health_checks run_all</tspan></text>
      <text x="24" y="332" fill="#34d399">  [PASS] hardware_checks · disk_status_check</text>
      <text x="24" y="350" fill="#34d399">  [PASS] cluster_checks · cluster_version_check</text>
      <text x="24" y="368" fill="#fbbf24">  [WARN] network_checks · ntp_sync_check</text>

      <text x="24" y="400" fill="#c084fc">nutanix@cvm-01:~$ <tspan fill="#00d4ff">_</tspan></text>
    </g>
  </g>

  <!-- Tool-name chips around the terminal -->
  <!-- Top row: ncli, acli, ncc, ovs -->
  <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="600">
    <g transform="translate(120, 280)" filter="url(#purpleGlow)">
      <rect x="0" y="0" width="120" height="46" rx="4" fill="rgba(192,132,252,0.18)" stroke="#c084fc" stroke-width="1.4"/>
      <text x="60" y="20" text-anchor="middle" fill="#c084fc">ncli</text>
      <text x="60" y="36" text-anchor="middle" font-size="9" fill="#a8b8d4">cluster mgmt</text>
    </g>
    <g transform="translate(120, 360)">
      <rect x="0" y="0" width="120" height="46" rx="4" fill="rgba(74,158,255,0.18)" stroke="#4a9eff" stroke-width="1.4"/>
      <text x="60" y="20" text-anchor="middle" fill="#4a9eff">acli</text>
      <text x="60" y="36" text-anchor="middle" font-size="9" fill="#a8b8d4">VM / storage / net</text>
    </g>
    <g transform="translate(120, 440)">
      <rect x="0" y="0" width="120" height="46" rx="4" fill="rgba(0,212,255,0.18)" stroke="#00d4ff" stroke-width="1.4"/>
      <text x="60" y="20" text-anchor="middle" fill="#00d4ff">ncc</text>
      <text x="60" y="36" text-anchor="middle" font-size="9" fill="#a8b8d4">health checks</text>
    </g>
    <g transform="translate(120, 520)">
      <rect x="0" y="0" width="120" height="46" rx="4" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-width="1.4"/>
      <text x="60" y="20" text-anchor="middle" fill="#34d399">cluster status</text>
      <text x="60" y="36" text-anchor="middle" font-size="9" fill="#a8b8d4">service health</text>
    </g>

    <!-- Right column -->
    <g transform="translate(1360, 280)">
      <rect x="0" y="0" width="120" height="46" rx="4" fill="rgba(251,191,36,0.18)" stroke="#fbbf24" stroke-width="1.4"/>
      <text x="60" y="20" text-anchor="middle" fill="#fbbf24">ovs-vsctl</text>
      <text x="60" y="36" text-anchor="middle" font-size="9" fill="#a8b8d4">on AHV host</text>
    </g>
    <g transform="translate(1360, 360)">
      <rect x="0" y="0" width="120" height="46" rx="4" fill="rgba(217,124,74,0.18)" stroke="#d97c4a" stroke-width="1.4"/>
      <text x="60" y="20" text-anchor="middle" fill="#d97c4a">manage_ovs</text>
      <text x="60" y="36" text-anchor="middle" font-size="9" fill="#a8b8d4">Nutanix wrapper</text>
    </g>
    <g transform="translate(1360, 440)">
      <rect x="0" y="0" width="120" height="46" rx="4" fill="rgba(192,132,252,0.18)" stroke="#c084fc" stroke-width="1.4"/>
      <text x="60" y="20" text-anchor="middle" fill="#c084fc">move</text>
      <text x="60" y="36" text-anchor="middle" font-size="9" fill="#a8b8d4">migration tool</text>
    </g>
    <g transform="translate(1360, 520)">
      <rect x="0" y="0" width="120" height="46" rx="4" fill="rgba(168,184,212,0.18)" stroke="#a8b8d4" stroke-width="1.4"/>
      <text x="60" y="20" text-anchor="middle" fill="#a8b8d4">allssh</text>
      <text x="60" y="36" text-anchor="middle" font-size="9" fill="#a8b8d4">cluster fan-out</text>
    </g>
  </g>

  <!-- Bottom: diagnostic recipes strip -->
  <g transform="translate(120, 700)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#e8f0ff" letter-spacing="0.10em">DIAGNOSTIC RECIPES</text>
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#a8b8d4">
      <text x="0" y="26"><tspan fill="#c084fc">▸</tspan> "Is the cluster healthy?" — ncc + ncli + cluster status</text>
      <text x="0" y="46"><tspan fill="#c084fc">▸</tspan> "Why is storage performance bad?" — Stargate 2009 page via links</text>
      <text x="0" y="66"><tspan fill="#c084fc">▸</tspan> "What's the rebuild status?" — ncli get-domain-fault-tolerance-status</text>
      <text x="700" y="26"><tspan fill="#c084fc">▸</tspan> "Did the snapshot succeed?" — acli vm.snapshot_list / ncli</text>
      <text x="700" y="46"><tspan fill="#c084fc">▸</tspan> "What's wrong with my OVS bond?" — ovs-vsctl + bond/show + manage_ovs</text>
      <text x="700" y="66"><tspan fill="#c084fc">▸</tspan> "Generate log bundle for support" — ncc log_collector run_all</text>
    </g>
  </g>

  <g transform="translate(120, 820)">
    <text x="680" y="14" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#c084fc" letter-spacing="0.10em">THREE PRINCIPLES</text>
    <text x="680" y="34" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#cfeeff">commands evolve · run dry-runs first · document what you ran · always check --help</text>
  </g>

  <radialGradient id="vignette" cx="50%" cy="50%" r="78%">
    <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
