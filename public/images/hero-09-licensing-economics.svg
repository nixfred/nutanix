<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="m9-title m9-desc">
  <title id="m9-title">Module 9 hero: Licensing tiers and 5-year TCO</title>
  <desc id="m9-desc">A tier ladder showing NCI Pro stepping up to NCI Ultimate stepping up to NCP Ultimate (the NCI plus NCM Ultimate bundle), wrapped by a subscription-meter ring annotated per-core and 1/3/5 year, alongside a 5-year stacked-bar TCO panel on the right showing hardware capex, subscription, support, services, and operations cost layers across the time axis.</desc>

  <defs>
    <radialGradient id="bgRad" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#143664"/>
      <stop offset="55%" stop-color="#0c1f3a"/>
      <stop offset="100%" stop-color="#070f1c"/>
    </radialGradient>

    <linearGradient id="tierPro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#244a82"/>
      <stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
    <linearGradient id="tierUlt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c5cad"/>
      <stop offset="100%" stop-color="#0d3268"/>
    </linearGradient>
    <linearGradient id="tierNcp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0094c4"/>
      <stop offset="100%" stop-color="#06556d"/>
    </linearGradient>
    <linearGradient id="tierEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,212,255,0.0)"/>
      <stop offset="50%" stop-color="rgba(0,212,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(0,212,255,0.0)"/>
    </linearGradient>

    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(74,158,255,0.0)"/>
      <stop offset="100%" stop-color="rgba(74,158,255,0.18)"/>
    </linearGradient>

    <linearGradient id="cvmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8552d"/>
      <stop offset="100%" stop-color="#7a2e15"/>
    </linearGradient>

    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bgRad)"/>

  <!-- subtle grid floor lines -->
  <g stroke="rgba(74,158,255,0.08)" stroke-width="1" fill="none">
    <path d="M0,720 L1600,720"/>
    <path d="M0,760 L1600,760"/>
    <path d="M0,800 L1600,800"/>
  </g>

  <!-- mono path top-left -->
  <text x="60" y="64" font-family="JetBrains Mono, ui-monospace, monospace" font-size="15" letter-spacing="0.04em" fill="#a8b8d4">
    <tspan fill="#00d4ff">/</tspan>nix<tspan fill="#00d4ff">/</tspan>nutanix<tspan fill="#00d4ff">/</tspan>09
  </text>
  <text x="60" y="86" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="0.10em" fill="#6b7a9a" opacity="0.85">LICENSING · BoM · 5-YEAR TCO · CFO MATH</text>

  <!-- ============================================================ -->
  <!-- LEFT HALF: TIER LADDER                                        -->
  <!-- ============================================================ -->

  <text x="380" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#e8f0ff" letter-spacing="0.10em">NCI · NCM · NCP</text>
  <text x="380" y="194" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="0.06em" fill="#a8b8d4">PER-CORE SUBSCRIPTION · 1 / 3 / 5 YEAR</text>

  <!-- NCP Ultimate (top step) -->
  <g transform="translate(140, 230)">
    <polygon points="0,40 60,0 540,0 480,40" fill="url(#tierNcp)" stroke="#00d4ff" stroke-width="1.2"/>
    <polygon points="480,40 540,0 540,80 480,120" fill="#093447" stroke="#00d4ff" stroke-width="1.2"/>
    <rect x="0" y="40" width="480" height="80" fill="url(#tierNcp)" stroke="#00d4ff" stroke-width="1.2"/>
    <text x="240" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#e8f0ff" letter-spacing="0.10em">NCP ULTIMATE</text>
    <text x="240" y="98" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#cfeeff">NCI Ultimate + NCM Ultimate</text>
    <text x="240" y="114" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#a8b8d4">Self-Service · X-Play · multi-cloud governance</text>
    <line x1="0" y1="40" x2="480" y2="40" stroke="url(#tierEdge)" stroke-width="2"/>
  </g>

  <!-- NCI Ultimate (middle step) -->
  <g transform="translate(110, 360)">
    <polygon points="0,40 60,0 600,0 540,40" fill="url(#tierUlt)" stroke="#4a9eff" stroke-width="1.2"/>
    <polygon points="540,40 600,0 600,80 540,120" fill="#091e3e" stroke="#4a9eff" stroke-width="1.2"/>
    <rect x="0" y="40" width="540" height="80" fill="url(#tierUlt)" stroke="#4a9eff" stroke-width="1.2"/>
    <text x="270" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#e8f0ff" letter-spacing="0.10em">NCI ULTIMATE</text>
    <text x="270" y="98" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#cfddff">+ NearSync · Metro · advanced data services</text>
    <text x="270" y="114" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#a8b8d4">formerly AOS Ultimate</text>
    <line x1="0" y1="40" x2="540" y2="40" stroke="url(#tierEdge)" stroke-width="1.6"/>
  </g>

  <!-- NCI Pro (bottom step / foundation) -->
  <g transform="translate(80, 490)">
    <polygon points="0,40 60,0 660,0 600,40" fill="url(#tierPro)" stroke="#4a9eff" stroke-width="1.2"/>
    <polygon points="600,40 660,0 660,80 600,120" fill="#0a1e3a" stroke="#4a9eff" stroke-width="1.2"/>
    <rect x="0" y="40" width="600" height="80" fill="url(#tierPro)" stroke="#4a9eff" stroke-width="1.2"/>
    <text x="300" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#e8f0ff" letter-spacing="0.10em">NCI PRO</text>
    <text x="300" y="98" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#cfddff">AHV · DSF · Prism · Async · baseline networking</text>
    <text x="300" y="114" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#a8b8d4">formerly AOS Pro · what most customers buy</text>
    <line x1="0" y1="40" x2="600" y2="40" stroke="url(#tierEdge)" stroke-width="1.6"/>
  </g>

  <!-- subscription meter ring (orbiting badge) -->
  <g transform="translate(700, 380)">
    <circle cx="0" cy="0" r="76" fill="rgba(0,212,255,0.06)" stroke="#00d4ff" stroke-width="1.4" stroke-dasharray="4 6"/>
    <circle cx="0" cy="0" r="60" fill="rgba(10,22,40,0.85)" stroke="#00d4ff" stroke-width="1"/>
    <text x="0" y="-12" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#00d4ff" letter-spacing="0.10em">PER-CORE</text>
    <text x="0" y="6" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#e8f0ff">subscription</text>
    <text x="0" y="24" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#a8b8d4">1 / 3 / 5 yr</text>
    <!-- tick marks for 5-year scale -->
    <g stroke="#00d4ff" stroke-width="1.4">
      <line x1="0" y1="-76" x2="0" y2="-86"/>
      <line x1="58" y1="-50" x2="66" y2="-58"/>
      <line x1="74" y1="14" x2="84" y2="16"/>
      <line x1="46" y1="60" x2="52" y2="68"/>
      <line x1="-46" y1="60" x2="-52" y2="68"/>
    </g>
  </g>

  <!-- floor shadow under tier ladder -->
  <ellipse cx="380" cy="640" rx="380" ry="20" fill="url(#floor)"/>

  <!-- ============================================================ -->
  <!-- RIGHT HALF: 5-YEAR STACKED-BAR TCO PANEL                      -->
  <!-- ============================================================ -->

  <g transform="translate(880, 180)">
    <text x="320" y="-8" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#e8f0ff" letter-spacing="0.10em">5-YEAR TCO · STACKED COST</text>
    <text x="320" y="14" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.06em" fill="#a8b8d4">HARDWARE · SUBSCRIPTION · SUPPORT · SERVICES · OPS</text>

    <!-- chart frame -->
    <rect x="20" y="40" width="600" height="380" fill="rgba(16,39,71,0.55)" stroke="rgba(31,58,102,0.7)" stroke-width="1"/>

    <!-- y-axis ticks -->
    <g stroke="rgba(74,158,255,0.18)" stroke-width="1" stroke-dasharray="2 4">
      <line x1="20" y1="100" x2="620" y2="100"/>
      <line x1="20" y1="180" x2="620" y2="180"/>
      <line x1="20" y1="260" x2="620" y2="260"/>
      <line x1="20" y1="340" x2="620" y2="340"/>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#6b7a9a" text-anchor="end">
      <text x="14" y="343">$0</text>
      <text x="14" y="263">$X</text>
      <text x="14" y="183">$2X</text>
      <text x="14" y="103">$3X</text>
      <text x="14" y="63">$4X+</text>
    </g>

    <!-- bars: Y1 is heaviest (capex + services), Y2-Y5 stable subscription/support/ops -->
    <!-- column: x=base, width=80, gap=20 -->
    <!-- Year 1: H 220 (capex 90 + services 50 + sub 30 + support 20 + ops 30) -->
    <g transform="translate(70, 80)">
      <!-- ops (gray, bottom) -->
      <rect x="0" y="270" width="80" height="20" fill="#6b7a9a" stroke="#a8b8d4" stroke-width="0.6"/>
      <!-- support -->
      <rect x="0" y="250" width="80" height="20" fill="#34d399" stroke="#34d399" stroke-width="0.6"/>
      <!-- subscription -->
      <rect x="0" y="220" width="80" height="30" fill="#4a9eff" stroke="#4a9eff" stroke-width="0.6"/>
      <!-- services (one-time, large in Y1) -->
      <rect x="0" y="170" width="80" height="50" fill="#fbbf24" stroke="#fbbf24" stroke-width="0.6"/>
      <!-- hardware capex -->
      <rect x="0" y="80" width="80" height="90" fill="#c084fc" stroke="#c084fc" stroke-width="0.6"/>
      <text x="40" y="305" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#e8f0ff">YEAR 1</text>
    </g>

    <!-- Year 2: subscription + support + ops (no capex, no services) -->
    <g transform="translate(170, 80)">
      <rect x="0" y="270" width="80" height="20" fill="#6b7a9a" stroke="#a8b8d4" stroke-width="0.6"/>
      <rect x="0" y="250" width="80" height="20" fill="#34d399" stroke="#34d399" stroke-width="0.6"/>
      <rect x="0" y="220" width="80" height="30" fill="#4a9eff" stroke="#4a9eff" stroke-width="0.6"/>
      <text x="40" y="305" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#e8f0ff">YEAR 2</text>
    </g>

    <!-- Year 3 -->
    <g transform="translate(270, 80)">
      <rect x="0" y="270" width="80" height="20" fill="#6b7a9a" stroke="#a8b8d4" stroke-width="0.6"/>
      <rect x="0" y="250" width="80" height="20" fill="#34d399" stroke="#34d399" stroke-width="0.6"/>
      <rect x="0" y="220" width="80" height="30" fill="#4a9eff" stroke="#4a9eff" stroke-width="0.6"/>
      <text x="40" y="305" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#e8f0ff">YEAR 3</text>
    </g>

    <!-- Year 4 -->
    <g transform="translate(370, 80)">
      <rect x="0" y="270" width="80" height="20" fill="#6b7a9a" stroke="#a8b8d4" stroke-width="0.6"/>
      <rect x="0" y="250" width="80" height="20" fill="#34d399" stroke="#34d399" stroke-width="0.6"/>
      <rect x="0" y="220" width="80" height="30" fill="#4a9eff" stroke="#4a9eff" stroke-width="0.6"/>
      <text x="40" y="305" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#e8f0ff">YEAR 4</text>
    </g>

    <!-- Year 5: subscription + support + ops + small refresh hint -->
    <g transform="translate(470, 80)">
      <rect x="0" y="270" width="80" height="20" fill="#6b7a9a" stroke="#a8b8d4" stroke-width="0.6"/>
      <rect x="0" y="250" width="80" height="20" fill="#34d399" stroke="#34d399" stroke-width="0.6"/>
      <rect x="0" y="220" width="80" height="30" fill="#4a9eff" stroke="#4a9eff" stroke-width="0.6"/>
      <!-- refresh approaching (dashed outline at top) -->
      <rect x="0" y="190" width="80" height="30" fill="none" stroke="#c084fc" stroke-width="1.2" stroke-dasharray="3 3"/>
      <text x="40" y="207" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#c084fc">refresh→</text>
      <text x="40" y="305" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#e8f0ff">YEAR 5</text>
    </g>

    <!-- legend -->
    <g transform="translate(20, 440)" font-family="JetBrains Mono, monospace" font-size="11">
      <g transform="translate(0,0)">
        <rect x="0" y="0" width="14" height="14" fill="#c084fc"/>
        <text x="22" y="11" fill="#a8b8d4">hardware capex</text>
      </g>
      <g transform="translate(150,0)">
        <rect x="0" y="0" width="14" height="14" fill="#fbbf24"/>
        <text x="22" y="11" fill="#a8b8d4">services (one-time)</text>
      </g>
      <g transform="translate(330,0)">
        <rect x="0" y="0" width="14" height="14" fill="#4a9eff"/>
        <text x="22" y="11" fill="#a8b8d4">subscription</text>
      </g>
      <g transform="translate(470,0)">
        <rect x="0" y="0" width="14" height="14" fill="#34d399"/>
        <text x="22" y="11" fill="#a8b8d4">support</text>
      </g>
      <g transform="translate(0,24)">
        <rect x="0" y="0" width="14" height="14" fill="#6b7a9a"/>
        <text x="22" y="11" fill="#a8b8d4">operations labor</text>
      </g>
      <g transform="translate(150,24)">
        <rect x="0" y="0" width="14" height="14" fill="none" stroke="#c084fc" stroke-width="1.2" stroke-dasharray="3 3"/>
        <text x="22" y="11" fill="#a8b8d4">refresh approaching (Y5–Y6)</text>
      </g>
    </g>

    <text x="320" y="510" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-style="italic" fill="#cfeeff">CFOs read shape, not just the total. Year 1 spike is capex + services; Y2–Y5 is the durable run-rate.</text>
  </g>

  <!-- bottom-left framing line -->
  <g transform="translate(60, 836)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#e8f0ff" letter-spacing="0.10em">FROM TECHNICAL WIN TO SIGNED DEAL</text>
    <text x="0" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#a8b8d4">complete BoM · all categories · stated assumptions · sensitivity analysis</text>
  </g>

  <!-- vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="78%">
    <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
