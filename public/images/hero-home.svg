<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Abstract isometric visualization of the Nutanix field guide: ten nodes representing the curriculum's ten modules interconnected by a distributed mesh.">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="80%">
      <stop offset="0%" stop-color="#15294a"/>
      <stop offset="65%" stop-color="#0c1c36"/>
      <stop offset="100%" stop-color="#070f20"/>
    </radialGradient>

    <linearGradient id="ftop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d6aa6"/>
      <stop offset="100%" stop-color="#27497a"/>
    </linearGradient>
    <linearGradient id="fleft" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#1f3a66"/>
      <stop offset="100%" stop-color="#142a4d"/>
    </linearGradient>
    <linearGradient id="fright" x1="0" y1="0.4" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f2444"/>
      <stop offset="100%" stop-color="#091a33"/>
    </linearGradient>

    <linearGradient id="ftopHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fa3e8"/>
      <stop offset="100%" stop-color="#357abf"/>
    </linearGradient>
    <linearGradient id="fleftHi" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#2b5288"/>
      <stop offset="100%" stop-color="#1a3866"/>
    </linearGradient>
    <linearGradient id="frightHi" x1="0" y1="0.4" x2="1" y2="0">
      <stop offset="0%" stop-color="#15325c"/>
      <stop offset="100%" stop-color="#0d2244"/>
    </linearGradient>

    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9ce8ff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#00d4ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>

    <pattern id="grid" width="80" height="46.188" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
      <path d="M 0 23.094 L 40 0 L 80 23.094 L 40 46.188 Z" fill="none" stroke="#2a4d7a" stroke-width="0.5" opacity="0.32"/>
    </pattern>

    <symbol id="node" overflow="visible">
      <polygon points="0,-52 78,-7 0,38 -78,-7" fill="url(#ftop)" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.55"/>
      <polygon points="-78,-7 0,38 0,128 -78,83" fill="url(#fleft)" stroke="#1f3a66" stroke-width="1"/>
      <polygon points="78,-7 0,38 0,128 78,83" fill="url(#fright)" stroke="#1f3a66" stroke-width="1"/>
      <line x1="-78" y1="22" x2="0" y2="67" stroke="#4a9eff" stroke-width="0.6" opacity="0.35"/>
      <line x1="0" y1="67" x2="78" y2="22" stroke="#4a9eff" stroke-width="0.6" opacity="0.35"/>
      <line x1="-78" y1="52" x2="0" y2="97" stroke="#4a9eff" stroke-width="0.6" opacity="0.2"/>
      <line x1="0" y1="97" x2="78" y2="52" stroke="#4a9eff" stroke-width="0.6" opacity="0.2"/>
      <circle cx="0" cy="-7" r="2.2" fill="#00d4ff"/>
    </symbol>

    <symbol id="nodeHi" overflow="visible">
      <polygon points="0,-52 78,-7 0,38 -78,-7" fill="url(#ftopHi)" stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.7"/>
      <polygon points="-78,-7 0,38 0,128 -78,83" fill="url(#fleftHi)" stroke="#2a4d7a" stroke-width="1"/>
      <polygon points="78,-7 0,38 0,128 78,83" fill="url(#frightHi)" stroke="#2a4d7a" stroke-width="1"/>
      <line x1="-78" y1="22" x2="0" y2="67" stroke="#00d4ff" stroke-width="0.7" opacity="0.55"/>
      <line x1="0" y1="67" x2="78" y2="22" stroke="#00d4ff" stroke-width="0.7" opacity="0.55"/>
      <line x1="-78" y1="52" x2="0" y2="97" stroke="#00d4ff" stroke-width="0.7" opacity="0.32"/>
      <line x1="0" y1="97" x2="78" y2="52" stroke="#00d4ff" stroke-width="0.7" opacity="0.32"/>
      <circle cx="0" cy="-7" r="3" fill="#00d4ff"/>
      <circle cx="0" cy="-7" r="6" fill="url(#dot)" opacity="0.9"/>
    </symbol>
  </defs>

  <!-- background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- isometric grid backdrop -->
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.5"/>

  <!-- twin cyan vignettes behind the two rows, suggesting a wider field -->
  <ellipse cx="620" cy="400" rx="420" ry="200" fill="#00d4ff" opacity="0.06" filter="url(#softGlow)"/>
  <ellipse cx="980" cy="600" rx="460" ry="220" fill="#00d4ff" opacity="0.05" filter="url(#softGlow)"/>

  <!--
    Composition: two staggered rows of 5 nodes each = 10, mapping the
    10 curriculum modules. Wider and flatter than the per-module hero
    so the home page reads as platform-wide overview.
    Row 0 (top):    y = 380; x = 440, 620, 800, 980, 1160
    Row 1 (bottom): y = 580; x = 530, 710, 890, 1070, 1250 (offset +90 px to interlock)
  -->
  <g>
    <!-- Connection mesh: drawn first so node cubes overlay cleanly.
         Anchor for each node is (cx, cy - 7) i.e. its top-of-cube vertex. -->
    <g stroke="#00d4ff" stroke-opacity="0.30" stroke-width="1" fill="none">
      <!-- Row 0 chain -->
      <line x1="440"  y1="373" x2="620"  y2="373"/>
      <line x1="620"  y1="373" x2="800"  y2="373"/>
      <line x1="800"  y1="373" x2="980"  y2="373"/>
      <line x1="980"  y1="373" x2="1160" y2="373"/>

      <!-- Row 1 chain -->
      <line x1="530"  y1="573" x2="710"  y2="573"/>
      <line x1="710"  y1="573" x2="890"  y2="573"/>
      <line x1="890"  y1="573" x2="1070" y2="573"/>
      <line x1="1070" y1="573" x2="1250" y2="573"/>

      <!-- Inter-row links (each top node to the two bottom nodes nearest below it) -->
      <line x1="440"  y1="373" x2="530"  y2="573"/>
      <line x1="620"  y1="373" x2="530"  y2="573"/>
      <line x1="620"  y1="373" x2="710"  y2="573"/>
      <line x1="800"  y1="373" x2="710"  y2="573"/>
      <line x1="800"  y1="373" x2="890"  y2="573"/>
      <line x1="980"  y1="373" x2="890"  y2="573"/>
      <line x1="980"  y1="373" x2="1070" y2="573"/>
      <line x1="1160" y1="373" x2="1070" y2="573"/>
      <line x1="1160" y1="373" x2="1250" y2="573"/>

      <!-- A handful of longer cross-cluster strands suggesting replication / cert ladder progression -->
      <line x1="440"  y1="373" x2="1250" y2="573" stroke-opacity="0.13"/>
      <line x1="1160" y1="373" x2="530"  y2="573" stroke-opacity="0.13"/>
      <line x1="800"  y1="373" x2="800"  y2="690" stroke-opacity="0.10"/>
    </g>

    <!-- Nodes. Three highlights placed for rhythm (Module 01 leftmost, Module 05 center, Module 10 rightmost). -->
    <!-- Row 0: top -->
    <use href="#nodeHi" x="440"  y="380"/>   <!-- highlighted: M01 HCI Foundations -->
    <use href="#node"   x="620"  y="380"/>
    <use href="#nodeHi" x="800"  y="380"/>   <!-- highlighted: M05 DSF Deep Dive -->
    <use href="#node"   x="980"  y="380"/>
    <use href="#node"   x="1160" y="380"/>

    <!-- Row 1: bottom -->
    <use href="#node"   x="530"  y="580"/>
    <use href="#node"   x="710"  y="580"/>
    <use href="#node"   x="890"  y="580"/>
    <use href="#node"   x="1070" y="580"/>
    <use href="#nodeHi" x="1250" y="580"/>   <!-- highlighted: M10 Migration Path -->
  </g>

  <!-- Foreground accent: subtle scanlines at bottom -->
  <rect x="0" y="858" width="1600" height="1" fill="#00d4ff" opacity="0.18"/>
  <rect x="0" y="862" width="1600" height="1" fill="#00d4ff" opacity="0.08"/>

  <!-- Mono path treatment, top-left (no module suffix; this is the home) -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#6b7a9a">
    <text x="48" y="56" letter-spacing="0.04em"><tspan fill="#00d4ff">/</tspan>nix<tspan fill="#00d4ff">/</tspan>nutanix</text>
  </g>

  <!-- Top-right meta: ten modules + thirteen reference appendices -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="12" fill="#6b7a9a" text-anchor="end">
    <text x="1552" y="56" letter-spacing="0.12em">10 MODULES &#xb7; 13 APPENDICES</text>
  </g>

  <!-- Wordmark + subtitle, bottom-left -->
  <g font-family="Inter, system-ui, sans-serif" fill="#a8b8d4">
    <text x="48" y="816" font-size="13" letter-spacing="0.18em" font-weight="600" fill="#6b7a9a">A FIELD GUIDE</text>
    <text x="48" y="852" font-size="34" font-weight="700" letter-spacing="-0.02em" fill="#e8f0ff">Nuta<tspan fill="#00d4ff">NIX</tspan> &#xb7; for BlueAlly Solutions Architects</text>
  </g>
</svg>
