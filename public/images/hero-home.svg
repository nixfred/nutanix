<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Topographic map abstraction with a cyan path tracing across the terrain through ten waypoints, evoking a field guide to the Nutanix curriculum.">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="80%">
      <stop offset="0%" stop-color="#15294a"/>
      <stop offset="65%" stop-color="#0c1c36"/>
      <stop offset="100%" stop-color="#070f20"/>
    </radialGradient>

    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9ce8ff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#00d4ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>

    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>

    <!-- Subtle hairline grid; deliberately faint so it doesn't fight the topo -->
    <pattern id="hairgrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 0 0 L 0 80 M 0 0 L 80 0" fill="none" stroke="#1f3a66" stroke-width="0.4" opacity="0.18"/>
    </pattern>

    <!-- Reusable contour-ring path, used across the three peaks. -->
  </defs>

  <!-- background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#hairgrid)"/>

  <!-- Soft cyan glow behind the central peak, very subtle -->
  <ellipse cx="850" cy="400" rx="520" ry="240" fill="#00d4ff" opacity="0.04" filter="url(#bigGlow)"/>

  <!--
    TOPOGRAPHIC LAYER — three peaks of nested contour ellipses.
    Strokes are navy hairlines at varying opacity to suggest elevation rings on a topo map.
    Each peak rotates and scales differently so the contours never read as concentric circles.
  -->
  <g fill="none" stroke="#3a6090" stroke-width="0.9">
    <!-- Peak A: bottom-left, lower elevation. Slight rotation. -->
    <g transform="translate(360 580) rotate(-12)">
      <ellipse rx="40"  ry="28"  opacity="0.85"/>
      <ellipse rx="78"  ry="54"  opacity="0.66"/>
      <ellipse rx="120" ry="84"  opacity="0.50"/>
      <ellipse rx="166" ry="116" opacity="0.36"/>
      <ellipse rx="218" ry="152" opacity="0.24"/>
      <ellipse rx="278" ry="194" opacity="0.14"/>
    </g>

    <!-- Peak B: center, the highest peak. Tilted opposite. -->
    <g transform="translate(870 360) rotate(8)">
      <ellipse rx="34"  ry="26"  opacity="0.95"/>
      <ellipse rx="70"  ry="54"  opacity="0.78"/>
      <ellipse rx="112" ry="86"  opacity="0.62"/>
      <ellipse rx="160" ry="124" opacity="0.46"/>
      <ellipse rx="216" ry="166" opacity="0.32"/>
      <ellipse rx="280" ry="216" opacity="0.20"/>
      <ellipse rx="354" ry="272" opacity="0.10"/>
    </g>

    <!-- Peak C: top-right, mid elevation. Tilted. -->
    <g transform="translate(1280 280) rotate(22)">
      <ellipse rx="42"  ry="30"  opacity="0.82"/>
      <ellipse rx="84"  ry="60"  opacity="0.62"/>
      <ellipse rx="132" ry="94"  opacity="0.46"/>
      <ellipse rx="184" ry="130" opacity="0.32"/>
      <ellipse rx="244" ry="172" opacity="0.20"/>
      <ellipse rx="312" ry="220" opacity="0.10"/>
    </g>

    <!-- A few stray contour fragments at the edges to suggest terrain extending off-canvas -->
    <g transform="translate(120 220) rotate(35)">
      <ellipse rx="180" ry="60"  opacity="0.10"/>
      <ellipse rx="240" ry="80"  opacity="0.06"/>
    </g>
    <g transform="translate(1480 760) rotate(-20)">
      <ellipse rx="200" ry="70"  opacity="0.10"/>
      <ellipse rx="270" ry="94"  opacity="0.06"/>
    </g>
  </g>

  <!--
    THE PATH — a curving traverse across the terrain from lower-left to upper-right.
    Underglow pass first, then the bright stroke on top.
  -->
  <g fill="none" stroke-linecap="round">
    <!-- Underglow -->
    <path d="M 130 740
             C 260 700, 340 640, 410 580
             S 600 460, 760 420
             S 990 410, 1110 470
             S 1280 360, 1410 230"
          stroke="#00d4ff" stroke-width="14" opacity="0.18" filter="url(#softGlow)"/>
    <!-- Crisp path -->
    <path d="M 130 740
             C 260 700, 340 640, 410 580
             S 600 460, 760 420
             S 990 410, 1110 470
             S 1280 360, 1410 230"
          stroke="#00d4ff" stroke-width="2.2" opacity="0.95"/>
    <!-- Faint dashed direction-of-travel overlay -->
    <path d="M 130 740
             C 260 700, 340 640, 410 580
             S 600 460, 760 420
             S 990 410, 1110 470
             S 1280 360, 1410 230"
          stroke="#9ce8ff" stroke-width="0.8" stroke-dasharray="2 8" opacity="0.55"/>
  </g>

  <!--
    TEN MODULE WAYPOINTS along the path.
    Each waypoint is a small cyan node with a glowing halo plus a mono numeric label.
    Coordinates were sampled by eye along the bezier above.
  -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="11" fill="#a8b8d4" letter-spacing="0.06em">

    <g transform="translate(190 720)">
      <circle r="11" fill="url(#dot)" opacity="0.7"/>
      <circle r="3.4" fill="#00d4ff"/>
      <text x="14" y="4" fill="#a8b8d4">01</text>
    </g>
    <g transform="translate(330 640)">
      <circle r="10" fill="url(#dot)" opacity="0.6"/>
      <circle r="3" fill="#00d4ff"/>
      <text x="13" y="4">02</text>
    </g>
    <g transform="translate(440 555)">
      <circle r="10" fill="url(#dot)" opacity="0.6"/>
      <circle r="3" fill="#00d4ff"/>
      <text x="13" y="4">03</text>
    </g>
    <g transform="translate(580 480)">
      <circle r="10" fill="url(#dot)" opacity="0.6"/>
      <circle r="3" fill="#00d4ff"/>
      <text x="13" y="4">04</text>
    </g>
    <g transform="translate(770 422)">
      <circle r="14" fill="url(#dot)" opacity="0.85"/>
      <circle r="4.2" fill="#00d4ff"/>
      <text x="16" y="4" fill="#e8f0ff" font-weight="600">05</text>
    </g>
    <g transform="translate(910 423)">
      <circle r="10" fill="url(#dot)" opacity="0.6"/>
      <circle r="3" fill="#00d4ff"/>
      <text x="13" y="4">06</text>
    </g>
    <g transform="translate(1040 450)">
      <circle r="10" fill="url(#dot)" opacity="0.6"/>
      <circle r="3" fill="#00d4ff"/>
      <text x="13" y="4">07</text>
    </g>
    <g transform="translate(1170 446)">
      <circle r="10" fill="url(#dot)" opacity="0.6"/>
      <circle r="3" fill="#00d4ff"/>
      <text x="13" y="4">08</text>
    </g>
    <g transform="translate(1300 360)">
      <circle r="10" fill="url(#dot)" opacity="0.6"/>
      <circle r="3" fill="#00d4ff"/>
      <text x="13" y="4">09</text>
    </g>
    <g transform="translate(1410 230)">
      <circle r="13" fill="url(#dot)" opacity="0.8"/>
      <circle r="4" fill="#00d4ff"/>
      <text x="-30" y="-14" fill="#e8f0ff" font-weight="600">10</text>
    </g>
  </g>

  <!-- Compass-style mark in the upper left corner of the map area -->
  <g transform="translate(120 130)" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="11" fill="#6b7a9a">
    <line x1="0" y1="-22" x2="0" y2="22" stroke="#3a6090" stroke-width="1"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#3a6090" stroke-width="1"/>
    <text x="0" y="-28" text-anchor="middle" fill="#00d4ff" font-weight="700">N</text>
    <text x="32" y="4" fill="#6b7a9a">FIELD GUIDE</text>
  </g>

  <!-- Faint scale-bar bottom-right, completing the map metaphor -->
  <g transform="translate(1280 760)" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="10" fill="#6b7a9a" letter-spacing="0.08em">
    <line x1="0"   y1="0" x2="50"  y2="0" stroke="#3a6090" stroke-width="1.5"/>
    <line x1="50"  y1="0" x2="100" y2="0" stroke="#a8b8d4" stroke-width="1.5"/>
    <line x1="100" y1="0" x2="150" y2="0" stroke="#3a6090" stroke-width="1.5"/>
    <line x1="0"   y1="-4" x2="0"   y2="4" stroke="#a8b8d4" stroke-width="1"/>
    <line x1="50"  y1="-4" x2="50"  y2="4" stroke="#a8b8d4" stroke-width="1"/>
    <line x1="100" y1="-4" x2="100" y2="4" stroke="#a8b8d4" stroke-width="1"/>
    <line x1="150" y1="-4" x2="150" y2="4" stroke="#a8b8d4" stroke-width="1"/>
    <text x="0"   y="18" fill="#6b7a9a">M01</text>
    <text x="150" y="18" text-anchor="end" fill="#6b7a9a">M10</text>
  </g>

  <!-- Foreground accent: subtle scanlines at bottom -->
  <rect x="0" y="858" width="1600" height="1" fill="#00d4ff" opacity="0.18"/>
  <rect x="0" y="862" width="1600" height="1" fill="#00d4ff" opacity="0.08"/>

  <!-- Mono path treatment, top-left -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#6b7a9a">
    <text x="48" y="56" letter-spacing="0.04em"><tspan fill="#00d4ff">/</tspan>nix<tspan fill="#00d4ff">/</tspan>nutanix</text>
  </g>

  <!-- Top-right meta -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="12" fill="#6b7a9a" text-anchor="end">
    <text x="1552" y="56" letter-spacing="0.12em">10 MODULES &#xb7; 13 APPENDICES</text>
  </g>

  <!-- Wordmark + subtitle, bottom-left -->
  <g font-family="Inter, system-ui, sans-serif" fill="#a8b8d4">
    <text x="48" y="816" font-size="13" letter-spacing="0.18em" font-weight="600" fill="#6b7a9a">A FIELD GUIDE</text>
    <text x="48" y="852" font-size="34" font-weight="700" letter-spacing="-0.02em" fill="#e8f0ff">Nuta<tspan fill="#00d4ff">NIX</tspan> &#xb7; for BlueAlly Solutions Architects</text>
  </g>
</svg>
