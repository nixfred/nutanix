<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="e-title e-desc">
  <title id="e-title">Appendix E hero: 46 discovery questions across 4 meeting types and 8 categories</title>
  <desc id="e-desc">A horizontal flow of four meeting-type columns (Kickoff, Technical Deep-Dive, Architecture Review, Commercial Review) progressing left to right with question count and duration per meeting, plus a strip of 8 category chips along the bottom showing question counts per category. Mono path top-left. Purple appendix accent.</desc>

  <defs>
    <radialGradient id="bgRad" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#143664"/>
      <stop offset="55%" stop-color="#0c1f3a"/>
      <stop offset="100%" stop-color="#070f1c"/>
    </radialGradient>

    <linearGradient id="meetGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(74,158,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(74,158,255,0.04)"/>
    </linearGradient>
    <linearGradient id="meetGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,212,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,212,255,0.04)"/>
    </linearGradient>
    <linearGradient id="meetGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(192,132,252,0.20)"/>
      <stop offset="100%" stop-color="rgba(192,132,252,0.04)"/>
    </linearGradient>
    <linearGradient id="meetGrad4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(251,191,36,0.18)"/>
      <stop offset="100%" stop-color="rgba(251,191,36,0.04)"/>
    </linearGradient>

    <filter id="purpleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 Z" fill="#c084fc"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bgRad)"/>

  <!-- subtle grid -->
  <g stroke="rgba(74,158,255,0.08)" stroke-width="1" fill="none">
    <path d="M0,720 L1600,720"/>
    <path d="M0,760 L1600,760"/>
    <path d="M0,800 L1600,800"/>
  </g>

  <!-- mono path -->
  <text x="60" y="64" font-family="JetBrains Mono, ui-monospace, monospace" font-size="15" letter-spacing="0.04em" fill="#a8b8d4">
    <tspan fill="#c084fc">/</tspan>nix<tspan fill="#c084fc">/</tspan>nutanix<tspan fill="#c084fc">/</tspan>appendix-e-discovery-questions
  </text>
  <text x="60" y="86" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="0.10em" fill="#6b7a9a" opacity="0.85">REFERENCE · 46 QUESTIONS · 8 CATEGORIES · 4 MEETING TYPES</text>

  <!-- HEADLINE -->
  <text x="800" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#e8f0ff" letter-spacing="0.16em">DISCOVERY QUESTION BANK</text>
  <text x="800" y="184" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.06em" fill="#a8b8d4">spend the first three meetings on discovery, not presentation</text>

  <!-- ============================================================ -->
  <!-- 4 MEETING TYPE COLUMNS                                        -->
  <!-- ============================================================ -->
  <g transform="translate(80, 230)">
    <!-- Kickoff -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="340" height="240" rx="6" fill="url(#meetGrad1)" stroke="#4a9eff" stroke-width="1.4"/>
      <text x="20" y="36" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.10em" fill="#6b7a9a" font-weight="600">MEETING · 01</text>
      <text x="20" y="68" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#4a9eff">Kickoff</text>
      <text x="20" y="92" font-family="JetBrains Mono, monospace" font-size="11" fill="#a8b8d4">60-90 minutes</text>
      <line x1="20" y1="110" x2="320" y2="110" stroke="#4a9eff" stroke-width="1" opacity="0.45"/>
      <g font-family="JetBrains Mono, monospace" font-size="11" fill="#cfddff">
        <text x="20" y="134">▸ Q-GEN-01 current infra</text>
        <text x="20" y="154">▸ Q-GEN-02 pain points</text>
        <text x="20" y="174">▸ Q-GEN-04 timeline</text>
        <text x="20" y="194">▸ Q-WL-01 VM count</text>
        <text x="20" y="214">▸ Q-ECON-01 run-rate</text>
      </g>
      <text x="320" y="232" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#a8b8d4" font-style="italic">5-7 questions</text>
    </g>

    <!-- arrow 1 -->
    <line x1="345" y1="120" x2="375" y2="120" stroke="#c084fc" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Deep-Dive -->
    <g transform="translate(380, 0)">
      <rect x="0" y="0" width="340" height="240" rx="6" fill="url(#meetGrad2)" stroke="#00d4ff" stroke-width="1.4"/>
      <text x="20" y="36" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.10em" fill="#6b7a9a" font-weight="600">MEETING · 02</text>
      <text x="20" y="68" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#00d4ff">Technical Deep-Dive</text>
      <text x="20" y="92" font-family="JetBrains Mono, monospace" font-size="11" fill="#a8b8d4">2-4 hours · domain-specific</text>
      <line x1="20" y1="110" x2="320" y2="110" stroke="#00d4ff" stroke-width="1" opacity="0.45"/>
      <g font-family="JetBrains Mono, monospace" font-size="11" fill="#cfeeff">
        <text x="20" y="134">▸ Q-STOR if storage</text>
        <text x="20" y="154">▸ Q-NET if networking</text>
        <text x="20" y="174">▸ Q-DR if DR</text>
        <text x="20" y="194">▸ Q-MGMT if management</text>
        <text x="20" y="214">▸ tailored to trigger</text>
      </g>
      <text x="320" y="232" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#a8b8d4" font-style="italic">5-10 questions</text>
    </g>

    <!-- arrow 2 -->
    <line x1="725" y1="120" x2="755" y2="120" stroke="#c084fc" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Architecture Review -->
    <g transform="translate(760, 0)" filter="url(#purpleGlow)">
      <rect x="0" y="0" width="340" height="240" rx="6" fill="url(#meetGrad3)" stroke="#c084fc" stroke-width="1.6"/>
      <text x="20" y="36" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.10em" fill="#6b7a9a" font-weight="600">MEETING · 03</text>
      <text x="20" y="68" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#c084fc">Architecture Review</text>
      <text x="20" y="92" font-family="JetBrains Mono, monospace" font-size="11" fill="#a8b8d4">half / full day · cross-domain</text>
      <line x1="20" y1="110" x2="320" y2="110" stroke="#c084fc" stroke-width="1" opacity="0.45"/>
      <g font-family="JetBrains Mono, monospace" font-size="11" fill="#cfeeff">
        <text x="20" y="134">▸ mix from all 8 categories</text>
        <text x="20" y="154">▸ Q-MIG migration planning</text>
        <text x="20" y="174">▸ Q-WL workload tiers</text>
        <text x="20" y="194">▸ rapport · expects depth</text>
        <text x="20" y="214">▸ feeds the proposal</text>
      </g>
      <text x="320" y="232" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#a8b8d4" font-style="italic">15-20 questions</text>
    </g>

    <!-- arrow 3 -->
    <line x1="1105" y1="120" x2="1135" y2="120" stroke="#c084fc" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Commercial -->
    <g transform="translate(1140, 0)">
      <rect x="0" y="0" width="340" height="240" rx="6" fill="url(#meetGrad4)" stroke="#fbbf24" stroke-width="1.4"/>
      <text x="20" y="36" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.10em" fill="#6b7a9a" font-weight="600">MEETING · 04</text>
      <text x="20" y="68" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#fbbf24">Commercial Review</text>
      <text x="20" y="92" font-family="JetBrains Mono, monospace" font-size="11" fill="#a8b8d4">~1 hour · decision</text>
      <line x1="20" y1="110" x2="320" y2="110" stroke="#fbbf24" stroke-width="1" opacity="0.45"/>
      <g font-family="JetBrains Mono, monospace" font-size="11" fill="#cfeeff">
        <text x="20" y="134">▸ Q-ECON depth</text>
        <text x="20" y="154">▸ Q-GEN-03 decision-makers</text>
        <text x="20" y="174">▸ refine financial story</text>
        <text x="20" y="194">▸ surface remaining objections</text>
        <text x="20" y="214">▸ propose next step</text>
      </g>
      <text x="320" y="232" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#a8b8d4" font-style="italic">3-5 questions</text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- 8 CATEGORY STRIP                                              -->
  <!-- ============================================================ -->
  <text x="800" y="540" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#e8f0ff" letter-spacing="0.16em">8 CATEGORIES · 46 QUESTIONS</text>

  <g transform="translate(80, 570)">
    <!-- Row 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="340" height="86" rx="6" fill="rgba(192,132,252,0.06)" stroke="rgba(192,132,252,0.40)" stroke-width="1"/>
      <text x="20" y="30" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="0.10em" fill="#6b7a9a">Q-GEN</text>
      <text x="20" y="56" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#e8f0ff">General Discovery</text>
      <text x="320" y="64" text-anchor="end" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#c084fc">6</text>
    </g>
    <g transform="translate(380, 0)">
      <rect x="0" y="0" width="340" height="86" rx="6" fill="rgba(192,132,252,0.06)" stroke="rgba(192,132,252,0.40)" stroke-width="1"/>
      <text x="20" y="30" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="0.10em" fill="#6b7a9a">Q-WL</text>
      <text x="20" y="56" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#e8f0ff">Workload Inventory</text>
      <text x="320" y="64" text-anchor="end" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#c084fc">6</text>
    </g>
    <g transform="translate(760, 0)">
      <rect x="0" y="0" width="340" height="86" rx="6" fill="rgba(192,132,252,0.06)" stroke="rgba(192,132,252,0.40)" stroke-width="1"/>
      <text x="20" y="30" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="0.10em" fill="#6b7a9a">Q-MGMT · Q-AUT</text>
      <text x="20" y="56" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#e8f0ff">Management + Automation</text>
      <text x="320" y="64" text-anchor="end" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#c084fc">4</text>
    </g>
    <g transform="translate(1140, 0)">
      <rect x="0" y="0" width="340" height="86" rx="6" fill="rgba(192,132,252,0.06)" stroke="rgba(192,132,252,0.40)" stroke-width="1"/>
      <text x="20" y="30" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="0.10em" fill="#6b7a9a">Q-STOR</text>
      <text x="20" y="56" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#e8f0ff">Storage</text>
      <text x="320" y="64" text-anchor="end" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#c084fc">9</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 110)">
      <rect x="0" y="0" width="340" height="86" rx="6" fill="rgba(192,132,252,0.06)" stroke="rgba(192,132,252,0.40)" stroke-width="1"/>
      <text x="20" y="30" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="0.10em" fill="#6b7a9a">Q-NET · Q-SEC</text>
      <text x="20" y="56" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#e8f0ff">Networking + Security</text>
      <text x="320" y="64" text-anchor="end" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#c084fc">5</text>
    </g>
    <g transform="translate(380, 110)">
      <rect x="0" y="0" width="340" height="86" rx="6" fill="rgba(192,132,252,0.06)" stroke="rgba(192,132,252,0.40)" stroke-width="1"/>
      <text x="20" y="30" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="0.10em" fill="#6b7a9a">Q-DR</text>
      <text x="20" y="56" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#e8f0ff">Data Protection + DR</text>
      <text x="320" y="64" text-anchor="end" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#c084fc">5</text>
    </g>
    <g transform="translate(760, 110)">
      <rect x="0" y="0" width="340" height="86" rx="6" fill="rgba(192,132,252,0.06)" stroke="rgba(192,132,252,0.40)" stroke-width="1"/>
      <text x="20" y="30" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="0.10em" fill="#6b7a9a">Q-MIG</text>
      <text x="20" y="56" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#e8f0ff">Migration</text>
      <text x="320" y="64" text-anchor="end" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#c084fc">6</text>
    </g>
    <g transform="translate(1140, 110)">
      <rect x="0" y="0" width="340" height="86" rx="6" fill="rgba(192,132,252,0.06)" stroke="rgba(192,132,252,0.40)" stroke-width="1"/>
      <text x="20" y="30" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="0.10em" fill="#6b7a9a">Q-ECON</text>
      <text x="20" y="56" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#e8f0ff">Economics</text>
      <text x="320" y="64" text-anchor="end" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#c084fc">5</text>
    </g>
  </g>

  <!-- discipline strip -->
  <g transform="translate(120, 820)">
    <text x="680" y="14" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#c084fc" letter-spacing="0.10em">FIVE PRINCIPLES OF DISCOVERY</text>
    <text x="680" y="34" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#cfeeff">open over closed · don't lead toward Nutanix · listen for the unsaid · ask follow-ups · take notes</text>
  </g>

  <!-- vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="78%">
    <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
