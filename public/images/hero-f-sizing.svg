<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="f-title f-desc">
  <title id="f-title">Appendix F hero: sizing math, raw-to-usable conversion, VM density</title>
  <desc id="f-desc">A storage-math waterfall on the left showing 100 TB raw stepping down through RF2 fifty-percent and compression two-times to ~80 TB effective, with reservation headroom annotated. A VM-density bar chart on the right shows VMs per node by user profile (task worker 180, knowledge worker 120, power user 80, developer 50). Discipline strip at bottom. Mono path top-left. Purple appendix accent.</desc>

  <defs>
    <radialGradient id="bgRad" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#143664"/>
      <stop offset="55%" stop-color="#0c1f3a"/>
      <stop offset="100%" stop-color="#070f1c"/>
    </radialGradient>

    <linearGradient id="rawGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(192,132,252,0.30)"/>
      <stop offset="100%" stop-color="rgba(192,132,252,0.10)"/>
    </linearGradient>
    <linearGradient id="usableGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(52,211,153,0.30)"/>
      <stop offset="100%" stop-color="rgba(52,211,153,0.10)"/>
    </linearGradient>

    <filter id="purpleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bgRad)"/>

  <g stroke="rgba(74,158,255,0.08)" stroke-width="1" fill="none">
    <path d="M0,720 L1600,720"/>
    <path d="M0,760 L1600,760"/>
    <path d="M0,800 L1600,800"/>
  </g>

  <!-- mono path -->
  <text x="60" y="64" font-family="JetBrains Mono, ui-monospace, monospace" font-size="15" letter-spacing="0.04em" fill="#a8b8d4">
    <tspan fill="#c084fc">/</tspan>nix<tspan fill="#c084fc">/</tspan>nutanix<tspan fill="#c084fc">/</tspan>appendix-f-sizing-rules
  </text>
  <text x="60" y="86" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="0.10em" fill="#6b7a9a" opacity="0.85">REFERENCE · SIZING RULES · BACK-OF-ENVELOPE · ALWAYS RUN SIZER FOR PROPOSAL</text>

  <text x="800" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#e8f0ff" letter-spacing="0.16em">QUOTE RANGES · PLAN FOR FAILURE · RESERVE HEADROOM</text>

  <!-- ============================================================ -->
  <!-- LEFT: Raw to Usable storage math (waterfall)                   -->
  <!-- ============================================================ -->
  <g transform="translate(80, 220)">
    <text x="340" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#c084fc" letter-spacing="0.10em">RAW → USABLE STORAGE MATH</text>

    <!-- 100 TB raw -->
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="680" height="56" fill="url(#rawGrad)" stroke="#c084fc" stroke-width="1.4" rx="4"/>
      <text x="20" y="34" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#c084fc">RAW DRIVE CAPACITY</text>
      <text x="660" y="34" text-anchor="end" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#e8f0ff">100 TB</text>
    </g>

    <!-- Arrow + RF2 -->
    <text x="50" y="115" font-family="JetBrains Mono, monospace" font-size="11" fill="#a8b8d4">↓ × 0.50 (RF2)</text>
    <g transform="translate(0, 120)">
      <rect x="0" y="0" width="340" height="48" fill="rgba(74,158,255,0.18)" stroke="#4a9eff" stroke-width="1.4" rx="4"/>
      <text x="20" y="30" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#4a9eff">after RF2</text>
      <text x="320" y="30" text-anchor="end" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#e8f0ff">50 TB</text>
    </g>

    <!-- Compression -->
    <text x="50" y="200" font-family="JetBrains Mono, monospace" font-size="11" fill="#a8b8d4">↓ × ~1.7 (compression, mixed enterprise)</text>
    <g transform="translate(0, 210)">
      <rect x="0" y="0" width="476" height="48" fill="rgba(0,212,255,0.18)" stroke="#00d4ff" stroke-width="1.4" rx="4"/>
      <text x="20" y="30" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#00d4ff">after compression</text>
      <text x="456" y="30" text-anchor="end" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#e8f0ff">~85 TB</text>
    </g>

    <!-- Reservation -->
    <text x="50" y="290" font-family="JetBrains Mono, monospace" font-size="11" fill="#a8b8d4">↓ × 0.85 (free-space reservation)</text>
    <g transform="translate(0, 300)" filter="url(#purpleGlow)">
      <rect x="0" y="0" width="404" height="56" fill="url(#usableGrad)" stroke="#34d399" stroke-width="1.6" rx="4"/>
      <text x="20" y="34" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#34d399">EFFECTIVE USABLE</text>
      <text x="384" y="34" text-anchor="end" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#e8f0ff">~72 TB</text>
    </g>

    <text x="0" y="380" font-family="JetBrains Mono, monospace" font-size="11" fill="#a8b8d4" font-style="italic">mixed enterprise · RF2 · 1.7× comp · 15% headroom · ~72% effective</text>
    <text x="0" y="396" font-family="JetBrains Mono, monospace" font-size="10" fill="#6b7a9a">RF3 cuts to ~50%; EC-X 4+1 instead of RF2 raises to ~80%; dedup adds 1.0–1.5× on similar data</text>
  </g>

  <!-- ============================================================ -->
  <!-- RIGHT: VM density chart                                        -->
  <!-- ============================================================ -->
  <g transform="translate(880, 220)">
    <text x="320" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#c084fc" letter-spacing="0.10em">VM DENSITY · VDI SESSIONS / NODE</text>

    <!-- Chart frame -->
    <g transform="translate(0, 30)">
      <!-- y-axis ticks -->
      <g stroke="rgba(74,158,255,0.18)" stroke-width="1" stroke-dasharray="2 4">
        <line x1="180" y1="40" x2="640" y2="40"/>
        <line x1="180" y1="80" x2="640" y2="80"/>
        <line x1="180" y1="120" x2="640" y2="120"/>
        <line x1="180" y1="160" x2="640" y2="160"/>
        <line x1="180" y1="200" x2="640" y2="200"/>
        <line x1="180" y1="240" x2="640" y2="240"/>
      </g>
      <g font-family="JetBrains Mono, monospace" font-size="9" fill="#6b7a9a" text-anchor="end">
        <text x="172" y="44">200</text>
        <text x="172" y="84">160</text>
        <text x="172" y="124">120</text>
        <text x="172" y="164">80</text>
        <text x="172" y="204">40</text>
        <text x="172" y="244">0</text>
      </g>

      <!-- Bars: task 180, knowledge 120, power 80, developer 50 -->
      <!-- y=240 is baseline; scale 0.5px per VM -->
      <!-- task 180 → height 90 → top y=240-90=150 -->
      <g transform="translate(190, 0)">
        <rect x="0" y="60" width="100" height="180" fill="rgba(52,211,153,0.30)" stroke="#34d399" stroke-width="1.4" rx="4"/>
        <text x="50" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#34d399">180</text>
        <text x="50" y="270" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#e8f0ff">Task</text>
        <text x="50" y="286" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#a8b8d4">light apps</text>
      </g>
      <g transform="translate(310, 0)">
        <rect x="0" y="120" width="100" height="120" fill="rgba(0,212,255,0.30)" stroke="#00d4ff" stroke-width="1.4" rx="4"/>
        <text x="50" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#00d4ff">120</text>
        <text x="50" y="270" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#e8f0ff">Knowledge</text>
        <text x="50" y="286" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#a8b8d4">Office + browser</text>
      </g>
      <g transform="translate(430, 0)">
        <rect x="0" y="160" width="100" height="80" fill="rgba(74,158,255,0.30)" stroke="#4a9eff" stroke-width="1.4" rx="4"/>
        <text x="50" y="148" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#4a9eff">80</text>
        <text x="50" y="270" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#e8f0ff">Power user</text>
        <text x="50" y="286" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#a8b8d4">specialty apps</text>
      </g>
      <g transform="translate(550, 0)">
        <rect x="0" y="190" width="100" height="50" fill="rgba(192,132,252,0.30)" stroke="#c084fc" stroke-width="1.4" rx="4"/>
        <text x="50" y="178" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#c084fc">50</text>
        <text x="50" y="270" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#e8f0ff">Developer</text>
        <text x="50" y="286" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#a8b8d4">heavy workload</text>
      </g>

      <!-- baseline -->
      <line x1="180" y1="240" x2="660" y2="240" stroke="#a8b8d4" stroke-width="1.2"/>
    </g>

    <text x="320" y="370" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#a8b8d4" font-style="italic">all-NVMe nodes, 768 GB+ RAM · refine via POC · sizer is the source of truth</text>
  </g>

  <!-- ============================================================ -->
  <!-- BOTTOM: Failure-tolerance + headroom strip                      -->
  <!-- ============================================================ -->
  <g transform="translate(80, 660)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#e8f0ff" letter-spacing="0.10em">PRACTICAL CEILINGS</text>
    <g font-family="JetBrains Mono, monospace" font-size="13">
      <text x="0" y="28" fill="#a8b8d4"><tspan fill="#c084fc">CPU</tspan> 70% peak</text>
      <text x="180" y="28" fill="#a8b8d4"><tspan fill="#c084fc">RAM</tspan> 75-85%</text>
      <text x="360" y="28" fill="#a8b8d4"><tspan fill="#c084fc">Storage</tspan> 75%</text>
      <text x="540" y="28" fill="#a8b8d4"><tspan fill="#c084fc">Network</tspan> 60-70% peak</text>
      <text x="780" y="28" fill="#a8b8d4"><tspan fill="#c084fc">Cluster size</tspan> 6-12 nodes sweet spot</text>
    </g>
    <text x="0" y="60" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#e8f0ff" letter-spacing="0.10em">FAILURE-TOLERANCE MINIMUMS</text>
    <g font-family="JetBrains Mono, monospace" font-size="13">
      <text x="0" y="88" fill="#a8b8d4"><tspan fill="#c084fc">RF2</tspan> N+1 (3-node min)</text>
      <text x="240" y="88" fill="#a8b8d4"><tspan fill="#c084fc">RF3</tspan> N+2</text>
      <text x="400" y="88" fill="#a8b8d4"><tspan fill="#c084fc">EC-X 4+1</tspan> 6 nodes recommended</text>
      <text x="780" y="88" fill="#a8b8d4"><tspan fill="#c084fc">EC-X 4+2</tspan> 7+ nodes</text>
    </g>
  </g>

  <!-- discipline strip -->
  <g transform="translate(120, 820)">
    <text x="680" y="14" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#c084fc" letter-spacing="0.10em">THREE PRINCIPLES</text>
    <text x="680" y="34" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#cfeeff">quote ranges, not point estimates · plan for failure tolerance · reserve 70-80% utilization headroom · sizer is the source of truth</text>
  </g>

  <radialGradient id="vignette" cx="50%" cy="50%" r="78%">
    <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
