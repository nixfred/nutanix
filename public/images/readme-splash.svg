<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 640" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="splash-title splash-desc">
  <title id="splash-title">NutaNIX · A field guide for BlueAlly Solutions Architects</title>
  <desc id="splash-desc">A wide splash banner showing the NutaNIX wordmark with the trailing NIX in cyan, the /nix/nutanix path treatment top-left, ten cyan module nodes numbered 01 through 10, eleven purple appendix nodes lettered A through K, the cert ladder strip (NCA, NCP family, NCM-MCI, NCX-MCI), the live URL nixfred.com/nutanix at the bottom, and a faint isometric cluster pattern in the background. Deep navy theme.</desc>

  <defs>
    <radialGradient id="bgRad" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#143664"/>
      <stop offset="50%" stop-color="#0c1f3a"/>
      <stop offset="100%" stop-color="#050a16"/>
    </radialGradient>

    <linearGradient id="wordGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cfe6ff"/>
    </linearGradient>

    <linearGradient id="nixGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7ce8ff"/>
    </linearGradient>

    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Isometric server-node group, reusable -->
    <g id="iso-node">
      <!-- top face -->
      <polygon points="0,-22 38,0 0,22 -38,0" fill="rgba(74,158,255,0.18)" stroke="rgba(0,212,255,0.35)" stroke-width="1"/>
      <!-- right face -->
      <polygon points="0,22 38,0 38,40 0,62" fill="rgba(16,39,71,0.85)" stroke="rgba(0,212,255,0.20)" stroke-width="1"/>
      <!-- left face -->
      <polygon points="0,22 -38,0 -38,40 0,62" fill="rgba(8,20,40,0.92)" stroke="rgba(74,158,255,0.20)" stroke-width="1"/>
      <!-- LEDs -->
      <circle cx="-22" cy="32" r="2" fill="#00d4ff"/>
      <circle cx="-14" cy="32" r="2" fill="#34d399"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="1600" height="640" fill="url(#bgRad)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(74,158,255,0.05)" stroke-width="1" fill="none">
    <line x1="0" y1="160" x2="1600" y2="160"/>
    <line x1="0" y1="320" x2="1600" y2="320"/>
    <line x1="0" y1="480" x2="1600" y2="480"/>
    <line x1="200" y1="0" x2="200" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="1400" y1="0" x2="1400" y2="640"/>
  </g>

  <!-- Background isometric cluster (faint, decorative) -->
  <g opacity="0.22">
    <use href="#iso-node" x="160" y="490"/>
    <use href="#iso-node" x="160" y="430"/>
    <use href="#iso-node" x="244" y="490"/>
    <use href="#iso-node" x="244" y="430"/>

    <use href="#iso-node" x="1356" y="490"/>
    <use href="#iso-node" x="1440" y="490"/>
    <use href="#iso-node" x="1356" y="430"/>
    <use href="#iso-node" x="1440" y="430"/>
  </g>

  <!-- Top labels -->
  <text x="60" y="56" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16" letter-spacing="0.04em" fill="#a8b8d4">
    <tspan fill="#c084fc">/</tspan>nix<tspan fill="#c084fc">/</tspan>nutanix
  </text>
  <text x="1540" y="56" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="0.18em" fill="#6b7a9a">FIELD GUIDE · BLUEALLY SOLUTIONS ARCHITECTS</text>

  <!-- Top hairline rule -->
  <line x1="60" y1="76" x2="1540" y2="76" stroke="rgba(74,158,255,0.12)" stroke-width="1"/>

  <!-- Big wordmark "NutaNIX" -->
  <g filter="url(#cyanGlow)">
    <text x="800" y="240" text-anchor="middle"
          font-family="Inter, ui-sans-serif, system-ui, sans-serif"
          font-size="180" font-weight="800" letter-spacing="-0.04em">
      <tspan fill="url(#wordGrad)">Nuta</tspan><tspan fill="url(#nixGrad)">NIX</tspan>
    </text>
  </g>

  <!-- Subtitle -->
  <text x="800" y="290" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="20" font-weight="500"
        letter-spacing="0.20em" fill="#a8b8d4">
    A FIELD GUIDE TO NUTANIX, WRITTEN FOR THE PEOPLE WHO HAVE TO EXPLAIN IT.
  </text>

  <!-- Stats line -->
  <text x="800" y="328" text-anchor="middle"
        font-family="JetBrains Mono, monospace" font-size="13"
        letter-spacing="0.10em" fill="#6b7a9a">
    TEN MODULES · ELEVEN APPENDICES · TWENTY-ONE HAND-AUTHORED HEROES · SEVEN-CERT LADDER
  </text>

  <!-- Modules row (10 chips) -->
  <g transform="translate(360, 380)" font-family="JetBrains Mono, monospace" font-weight="700">
    <text x="-30" y="32" text-anchor="end" font-size="10" letter-spacing="0.16em" fill="#00d4ff">MODULES</text>
    <g filter="url(#softGlow)">
      <!-- Each chip: 80 wide, 56 tall, 8 gap -->
      <g transform="translate(0, 0)"><rect width="80" height="56" rx="6" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="13" fill="#00d4ff">01</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">HCI</text></g>
      <g transform="translate(88, 0)"><rect width="80" height="56" rx="6" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="13" fill="#00d4ff">02</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">ARCH</text></g>
      <g transform="translate(176, 0)"><rect width="80" height="56" rx="6" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="13" fill="#00d4ff">03</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">AHV</text></g>
      <g transform="translate(264, 0)"><rect width="80" height="56" rx="6" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="13" fill="#00d4ff">04</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">PRISM</text></g>
      <g transform="translate(352, 0)"><rect width="80" height="56" rx="6" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="13" fill="#00d4ff">05</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">DSF</text></g>
      <g transform="translate(440, 0)"><rect width="80" height="56" rx="6" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="13" fill="#00d4ff">06</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">NET</text></g>
      <g transform="translate(528, 0)"><rect width="80" height="56" rx="6" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="13" fill="#00d4ff">07</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">DR</text></g>
      <g transform="translate(616, 0)"><rect width="80" height="56" rx="6" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="13" fill="#00d4ff">08</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">UNIFIED</text></g>
      <g transform="translate(704, 0)"><rect width="80" height="56" rx="6" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="13" fill="#00d4ff">09</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">$</text></g>
      <g transform="translate(792, 0)"><rect width="80" height="56" rx="6" fill="rgba(0,212,255,0.10)" stroke="#00d4ff" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="13" fill="#00d4ff">10</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">MIGRATE</text></g>
    </g>
  </g>

  <!-- Appendices row (11 chips A-K) -->
  <g transform="translate(316, 460)" font-family="JetBrains Mono, monospace" font-weight="700">
    <text x="-30" y="32" text-anchor="end" font-size="10" letter-spacing="0.16em" fill="#c084fc">APPENDICES</text>
    <g>
      <g transform="translate(0, 0)"><rect width="80" height="56" rx="6" fill="rgba(192,132,252,0.10)" stroke="#c084fc" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="14" fill="#c084fc">A</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">GLOSS</text></g>
      <g transform="translate(88, 0)"><rect width="80" height="56" rx="6" fill="rgba(192,132,252,0.10)" stroke="#c084fc" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="14" fill="#c084fc">B</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">COMPARE</text></g>
      <g transform="translate(176, 0)"><rect width="80" height="56" rx="6" fill="rgba(192,132,252,0.10)" stroke="#c084fc" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="14" fill="#c084fc">C</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">SCENARIO</text></g>
      <g transform="translate(264, 0)"><rect width="80" height="56" rx="6" fill="rgba(192,132,252,0.10)" stroke="#c084fc" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="14" fill="#c084fc">D</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">OBJECT</text></g>
      <g transform="translate(352, 0)"><rect width="80" height="56" rx="6" fill="rgba(192,132,252,0.10)" stroke="#c084fc" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="14" fill="#c084fc">E</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">DISCOVER</text></g>
      <g transform="translate(440, 0)"><rect width="80" height="56" rx="6" fill="rgba(192,132,252,0.10)" stroke="#c084fc" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="14" fill="#c084fc">F</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">SIZING</text></g>
      <g transform="translate(528, 0)"><rect width="80" height="56" rx="6" fill="rgba(192,132,252,0.10)" stroke="#c084fc" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="14" fill="#c084fc">G</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">CLI</text></g>
      <g transform="translate(616, 0)"><rect width="80" height="56" rx="6" fill="rgba(192,132,252,0.10)" stroke="#c084fc" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="14" fill="#c084fc">H</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">COMPETE</text></g>
      <g transform="translate(704, 0)"><rect width="80" height="56" rx="6" fill="rgba(192,132,252,0.10)" stroke="#c084fc" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="14" fill="#c084fc">I</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">REFARCH</text></g>
      <g transform="translate(792, 0)"><rect width="80" height="56" rx="6" fill="rgba(192,132,252,0.10)" stroke="#c084fc" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="14" fill="#c084fc">J</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">POC</text></g>
      <g transform="translate(880, 0)"><rect width="80" height="56" rx="6" fill="rgba(192,132,252,0.10)" stroke="#c084fc" stroke-width="1.4"/><text x="40" y="22" text-anchor="middle" font-size="14" fill="#c084fc">K</text><text x="40" y="42" text-anchor="middle" font-size="9" fill="#a8b8d4" font-weight="500">CERTS</text></g>
    </g>
  </g>

  <!-- Cert ladder mini-strip -->
  <g transform="translate(800, 562)" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" letter-spacing="0.10em">
    <text text-anchor="middle" y="0" fill="#34d399">NCA</text>
    <text text-anchor="middle" x="80" y="0" fill="#a8b8d4">→</text>
    <text text-anchor="middle" x="180" y="0" fill="#00d4ff">NCP-MCI · NS · US · MCA</text>
    <text text-anchor="middle" x="320" y="0" fill="#a8b8d4">→</text>
    <text text-anchor="middle" x="400" y="0" fill="#c084fc">NCM-MCI</text>
    <text text-anchor="middle" x="478" y="0" fill="#a8b8d4">→</text>
    <text text-anchor="middle" x="560" y="0" fill="#fbbf24">NCX-MCI</text>
    <text text-anchor="middle" y="0" x="-180" fill="#6b7a9a" letter-spacing="0.16em">CERT LADDER</text>
  </g>

  <!-- Bottom URL strip -->
  <line x1="60" y1="595" x2="1540" y2="595" stroke="rgba(74,158,255,0.12)" stroke-width="1"/>
  <text x="800" y="618" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="0.06em" fill="#cfeeff">
    live at <tspan fill="#00d4ff">nixfred.com</tspan><tspan fill="#c084fc">/</tspan>nutanix
  </text>

  <!-- Vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="78%">
    <stop offset="55%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
  </radialGradient>
  <rect width="1600" height="640" fill="url(#vignette)"/>
</svg>
